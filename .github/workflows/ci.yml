name: iOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app
      
      - name: Build project (generic iOS simulator)
        run: |
          cd FoodDeliveryApp
          xcodebuild -project FoodDeliveryApp.xcodeproj -scheme FoodDeliveryApp -destination 'generic/platform=iOS Simulator' build

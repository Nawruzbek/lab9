name: iOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app
      
      - name: Build and Test
        run: |
          cd FoodDeliveryApp
          xcodebuild test \
            -project FoodDeliveryApp.xcodeproj \
            -scheme FoodDeliveryApp \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -only-testing:FoodDeliveryAppTests \
            -only-testing:FoodDeliveryAppUITests

name: Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          cd FoodDeliveryApp
          xcodebuild -project FoodDeliveryApp.xcodeproj -scheme FoodDeliveryApp -destination 'generic/platform=iOS Simulator' build

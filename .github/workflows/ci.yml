name: iOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app
      
      - name: List available simulators
        run: xcrun simctl list devices available
      
      - name: Build project
        run: |
          cd FoodDeliveryApp
          xcodebuild -project FoodDeliveryApp.xcodeproj -scheme FoodDeliveryApp -destination 'platform=iOS Simulator,name=iPhone 16' build

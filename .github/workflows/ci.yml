name: Build App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
      run: |
        cd FoodDeliveryApp
        xcodebuild -project FoodDeliveryApp.xcodeproj -scheme FoodDeliveryApp build
